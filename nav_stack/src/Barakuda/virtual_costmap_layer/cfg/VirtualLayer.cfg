#!/usr/bin/env python

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# For integers and doubles:
#       Name                    Type      Reconfiguration level
#       Description
#       Default  Min  Max


gen.add("enabled", bool_t, 0, "Whether to apply this plugin or not", True)
gen.add("one_zone", bool_t, 0, "Save only one zone of navigation or not", True)
gen.add("clear_obstacles", bool_t, 0, "Whether to clear obstacles or not", True)
gen.add("map_frame", str_t, 0, "Name of the map frame", "map")
gen.add("base_frame", str_t, 0, "Name of the base frame of the robot", "base_link")
gen.add("tf_acceptable_delay", double_t, 0, "The maximum authorized delay for the tf used to reproject data", 1.0, 0.1, 100.0)
gen.add("tf_strict", bool_t, 0, "If, when the last tf is holder than tf_acceptable_delay, it should crash", False)

exit(gen.generate("virtual_costmap_layer", "virtual_costmap_layer", "VirtualLayer"))