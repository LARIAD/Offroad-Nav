#   lenght_view: 60.
csf_segmentation_gpu: # CSF's params   
  enable: False # need to keep plugin manager unchanged  
  csf_cloth_resolution: 0.15
  csf_bSloopSmooth: False 
  csf_class_threshold: 0.05
  csf_time_step: 0.3
  csf_rigidness: 6 
  csf_interations: 100
  lenght_view: 60. 

csf_inflated:
  type: "inflation"
  enable: true
  fill_nan: false 
  is_height_layer: false
  layer_name: "csf_inflated"
  extra_params:
    input_layer_name: "csf_gpu"

    # --- Obstacle detection ---
    obstacle_threshold: 0.3

    # --- Inflation behavior (metric, not pixels) ---
    inflation_radius_m: 0.1     # ~40 cm safety buffer
    cost_scaling_factor: 0.3    # Lower = wider, smoother inflation

    # --- Cost values ---
    lethal_cost: 1.0            # Hard obstacle cost
    inflation_cost: 0.6         # Max cost at obstacle boundary

    # --- Map properties (MUST match your grid map) ---
    map_resolution: 0.15        # meters per cell


