dlio:

  version: 1.1.1

  verbose: false
  adaptive: true

  pointcloud:
    deskew: false
    voxelize: true

  imu:
    change_for_up: true
    calibration: true
    intrinsics:
      accel:
        bias: [ 0.0, 0.0, 0.0 ]
        sm:   [ 0.,  1.,  0.,
                1.,  0.,  0.,
                0.,  0.,  -1. ]
      gyro:
        bias: [ 0.0, 0.0, 0.0 ]

  extrinsics:
    translation: [ 0.670, -0.000, -0.840 ]
      
    baselink2imu:
      t: [ -0.002, -0.010, 0.008 ]
      R: [ 1.,  0.,  0.,
           0.,  1.,  0.,
           0.,  0.,  1. ]
