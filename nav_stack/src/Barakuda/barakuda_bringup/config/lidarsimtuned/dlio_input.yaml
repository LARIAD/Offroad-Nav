      #      -0.0000904,   1.   ,      -0.00001016,
      #      -0.97506195, -0.0000904,  -0.22193285]
    baselink2lidar:
      t: [ 0.0, 0.0, 0.0 ]
      R: [ 1.,  0.,  0.,
           0.,  1.,  0.,
           0.,  0.,  1. ]
      # [ 1.018, 0.000, 0.342 ]
      # [  0.4093084,  0.8776632,  0.2493471,
