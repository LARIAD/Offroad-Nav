global_frame: map
robot_base_frame: base_link
update_frequency: 5.0
publish_frequency: 2.0

#set if you want the voxel map published
#publish_voxel_map: true

#set to true if you want to initialize the costmap from a static map


#begin - COMMENT these lines if you set static_map to true

width: 100.0
height: 100.0
origin_x: -50.0
origin_y: -50.0
resolution: 0.5
#end - COMMENT these lines if you set static_map to true

static_map: true
rolling_window: false

always_send_full_costmap: true
#START VOXEL STUFF
#map_type: voxel
#origin_z: 0.0
#z_resolution: 0.2
#z_voxels: 10
#unknown_threshold: 10
#mark_threshold: 0
#END VOXEL STUFF

transform_tolerance: 0.3
obstacle_range: 2.5
max_obstacle_height: 2.0
raytrace_range: 3.0
footprint: [[-0.95, -0.6], [-0.95, 0.6], [0.95, 0.6], [0.95, -0.6]]
#robot_radius: 0.46
footprint_padding: 0.01
inflation_radius: 1.5
trinary_costmap: true
#cost_scaling_factor: 10.0
#lethal_cost_threshold: 100
#observation_sources: base_scan
#base_scan: {data_type: LaserScan, expected_update_rate: 0.4,
#  observation_persistence: 0.0, marking: true, clearing: true, max_obstacle_height: 0.4, min_obstacle_height: 0.08}
virtual_layer:
  enabled:              true
  zone_topics:          [/virtual_costamp_layer/zone]
  obstacle_topics:      [/manager/exclusion_poly]
  one_zone:             true     
  forms:    
     - [0.4, 0.0]
     - [[0.4, 0.0]]
     - [[-0.4, 0.0],[0.0, 0.4]]
     - [[5, 5],[-5, 5],[-5, -5],[5, -5]]
use_grid_map: true
grid_map_topic_name: /elevation_mapping/elevation_map_raw_gpu
odom_topic_name: /imu/odometry
# inflation_layer:
#   cost_scaling_factor: 1.    # a factor value of <10 will reduce the cost in a slower pace.
#   inflation_radius: 2.0

movebase_gridmap_layer:
  enable: true
  gridmap_layer_name: "csf_inflated"
plugins:
  - { name: movebase_gridmap_layer, type: "mbf_gridmap_costmap_wrapper::MoveBaseGridMapLayer" }