dlio:

  frames:
    odom: odom
    baselink: base_link
    lidar: os_sensor
    imu: imu
    concatenate: false

  map:
    waitUntilMove: true
    dense:
      filtered: false
    sparse:
      leafSize: 0.25

  odom:

    gravity: 9.80665
    computeTimeOffset: true

    imu:
      approximateGravity: true
      calibration:
        gyro: true
        accel: true
        time: 3
      bufferSize: 500

    preprocessing:
      cropBoxFilter:
        size: 1.0
      voxelFilter:
        res: 0.25

    keyframe:
      threshD: 5.0
      threshR: 45.0

    submap:
      keyframe:
        knn: 10
        kcv: 10
        kcc: 10
    gicp:
      minNumPoints: 64
      kCorrespondences: 16
      maxCorrespondenceDistance: 0.5
      maxIterations: 32
      transformationEpsilon: 0.01
      rotationEpsilon: 0.01
      initLambdaFactor: 1e-9

    geo:
      Kp: 4.5
      Kv: 11.25
      Kq: 4.0
      Kab: 2.25
      Kgb: 1.0
      abias_max: 5.0
      gbias_max: 0.5

    buffers_size:
      trajectory: 500
      comp_times: 500
      imu_rates: 500
      lidar_rates: 500
      spaciousness: 500
      density: 500
      keyframes: 10
      keyframe_timestamps: 10
      keyframe_normals: 10
      keyframe_transformations: 10